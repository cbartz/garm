name: Go Tests

on:
  push:
    branches:
      - main
      - 'release/**'
      - 'feat/postgres-backend'
  pull_request:
    branches:
      - main
      - 'release/**'
      - 'feat/postgres-backend'

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

permissions: {}

jobs:
  linters:
    name: Linters
    # TODO(upstream): switch back to ubuntu-noble-garm before raising upstream PR
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libbtrfs-dev build-essential apg jq

      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: make lint
        run: make golangci-lint && GOLANGCI_LINT_EXTRA_ARGS="--timeout=8m --build-tags=testing,integration" make lint
      - name: Verify go vendor, go modules and gofmt
        run: |
          sudo apt-get install -y jq
          make verify

  go-tests:
    # TODO(upstream): switch back to ubuntu-noble-garm before raising upstream PR
    runs-on: ubuntu-latest
    needs: [linters]
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libbtrfs-dev build-essential apg jq default-jre

      - uses: actions/setup-node@v6
        with:
          node-version: '>=v24.5.0'

      - name: Set up openapi-generator-cli
        run: |
          mkdir -p $HOME/openapi-generator
          cd $HOME/openapi-generator
          npm install @openapitools/openapi-generator-cli
          echo "$HOME/openapi-generator/node_modules/.bin" >> $GITHUB_PATH

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - run: go version

      - name: Run go generate
        run: |
          make generate

      - name: Run GARM Go Tests
        run: make go-test

      - name: Run web UI tests
        run: |
          make webui-test

  go-tests-postgres:
    name: Go Tests (PostgreSQL)
    # TODO(upstream): switch to ubuntu-noble-garm to align with other jobs before raising upstream PR
    runs-on: ubuntu-latest
    needs: [linters]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: garm
          POSTGRES_PASSWORD: garmpassword
          POSTGRES_DB: garm
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libbtrfs-dev build-essential

      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Golang
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run GARM Go Tests (PostgreSQL)
        run: make go-test
        env:
          GARM_TEST_POSTGRES_DSN: "postgres://garm:garmpassword@localhost:5432/garm?sslmode=disable"
